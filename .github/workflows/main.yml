# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - "v*" # Triggers on tags like v1.0.0, v2.3.1, etc.

permissions:
  contents: write # Required for creating releases and uploading assets

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-26.04, macos-15] # Linux x86_64 + macOS arm64 (Apple Silicon)
        # Add macos-13 if you also want Intel macOS support

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local

      - name: Build
        run: cmake --build build --config Release -j$(nproc || sysctl -n hw.nproc)

      - name: Install (stage)
        run: cmake --install build --prefix ./staging

      - name: Package binary
        run: |
          EXEC_NAME="newcx"
          VERSION=${GITHUB_REF_NAME#v}

          mkdir -p artifacts
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            cp ./staging/bin/$EXEC_NAME artifacts/${EXEC_NAME}-${VERSION}-linux-x86_64
            chmod +x artifacts/${EXEC_NAME}-${VERSION}-linux-x86_64
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            cp ./staging/bin/$EXEC_NAME artifacts/${EXEC_NAME}-${VERSION}-darwin-arm64
            chmod +x artifacts/${EXEC_NAME}-${VERSION}-darwin-arm64
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-binary
          path: artifacts/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*
          generate_release_notes: true
