name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_suffix }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            asset_suffix: linux-x86_64
            artifact_extension: ""
            cxx: g++-14
          - os: macos-15
            asset_suffix: darwin-arm64
            artifact_extension: ""
            cxx: clang++
          - os: macos-15-intel
            asset_suffix: darwin-x86_64
            artifact_extension: ""
            cxx: clang++
          - os: windows-2025
            asset_suffix: windows-x86_64
            artifact_extension: ".exe"
            cxx: cl

    runs-on: ${{ matrix.os }}
    env:
      CMAKE_BUILD_TYPE: Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14 cmake ninja-build

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-Command cmake -ErrorAction SilentlyContinue)) {
            choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y --no-progress
          }

          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y --no-progress
          }

          "C:\Program Files\CMake\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Show toolchain
        shell: bash
        run: |
          uname -a
          cmake --version
          ninja --version
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            cl
          else
            "${{ matrix.cxx }}" --version
          fi

      - name: Verify required C++ standard library headers
        shell: bash
        run: |
          PROBE_CPP="${RUNNER_TEMP}/newcx-cxx23-probe.cpp"
          cat > "${PROBE_CPP}" <<'EOF'
          #include <expected>
          #include <format>
          #include <print>
          #include <ranges>

          int main() {
              std::expected<int, int> result = 1;
              auto view = std::views::iota(0, 1);
              std::println("{}", std::format("{}", *view.begin() + result.value()));
          }
          EOF

          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            PROBE_EXE="${RUNNER_TEMP}/newcx-cxx23-probe.exe"
            cl /nologo /EHsc /std:c++latest "${PROBE_CPP}" /Fe:"${PROBE_EXE}"
            "${PROBE_EXE}"
          else
            PROBE_EXE="${RUNNER_TEMP}/newcx-cxx23-probe"
            "${{ matrix.cxx }}" -std=c++23 "${PROBE_CPP}" -o "${PROBE_EXE}"
            "${PROBE_EXE}"
          fi

      - name: Configure CMake
        shell: bash
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE="${CMAKE_BUILD_TYPE}" \
            -DCMAKE_CXX_COMPILER="${{ matrix.cxx }}" \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DCMAKE_VERBOSE_MAKEFILE=ON

      - name: Build
        shell: bash
        run: cmake --build build --config "${CMAKE_BUILD_TYPE}" --parallel

      - name: Install (stage)
        shell: bash
        run: cmake --install build --prefix ./staging

      - name: Package binary
        shell: bash
        run: |
          EXEC_NAME="newcx"
          VERSION=${GITHUB_REF_NAME#v}
          ARTIFACT="${EXEC_NAME}-v${VERSION}-${{ matrix.asset_suffix }}${{ matrix.artifact_extension }}"

          mkdir -p artifacts
          cp "./staging/bin/${EXEC_NAME}${{ matrix.artifact_extension }}" "artifacts/${ARTIFACT}"
          chmod +x "artifacts/${ARTIFACT}"

      - name: Smoke test packaged binary
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ARTIFACT="newcx-v${VERSION}-${{ matrix.asset_suffix }}${{ matrix.artifact_extension }}"
          EXEC_SUFFIX="${{ matrix.artifact_extension }}"
          SMOKE_DIR="$(mktemp -d)"
          cp "./artifacts/${ARTIFACT}" "${SMOKE_DIR}/newcx${EXEC_SUFFIX}"
          "${SMOKE_DIR}/newcx${EXEC_SUFFIX}" link
          "${SMOKE_DIR}/newc${EXEC_SUFFIX}" --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: newcx-${{ matrix.asset_suffix }}
          path: artifacts/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*
          generate_release_notes: true
