name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_suffix }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            asset_suffix: linux-x86_64
            cxx: g++-14
          - os: macos-15
            asset_suffix: darwin-arm64
            cxx: clang++
          - os: macos-15-intel
            asset_suffix: darwin-x86_64
            cxx: clang++

    runs-on: ${{ matrix.os }}
    env:
      CMAKE_BUILD_TYPE: Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14 cmake ninja-build

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja

      - name: Show toolchain
        run: |
          uname -a
          cmake --version
          ninja --version
          "${{ matrix.cxx }}" --version

      - name: Verify required C++ standard library headers
        shell: bash
        run: |
          cat > /tmp/newcx-cxx23-probe.cpp <<'EOF'
          #include <expected>
          #include <format>
          #include <print>
          #include <ranges>

          int main() {
              std::expected<int, int> result = 1;
              auto view = std::views::iota(0, 1);
              std::println("{}", std::format("{}", *view.begin() + result.value()));
          }
          EOF
          "${{ matrix.cxx }}" -std=c++23 /tmp/newcx-cxx23-probe.cpp -o /tmp/newcx-cxx23-probe
          /tmp/newcx-cxx23-probe

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE="${CMAKE_BUILD_TYPE}" \
            -DCMAKE_CXX_COMPILER="${{ matrix.cxx }}" \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DCMAKE_VERBOSE_MAKEFILE=ON

      - name: Build
        run: cmake --build build --config "${CMAKE_BUILD_TYPE}" --parallel

      - name: Install (stage)
        run: cmake --install build --prefix ./staging

      - name: Package binary
        run: |
          EXEC_NAME="newcx"
          VERSION=${GITHUB_REF_NAME#v}

          mkdir -p artifacts
          cp "./staging/bin/${EXEC_NAME}" "artifacts/${EXEC_NAME}-v${VERSION}-${{ matrix.asset_suffix }}"
          chmod +x "artifacts/${EXEC_NAME}-v${VERSION}-${{ matrix.asset_suffix }}"

      - name: Smoke test packaged binary
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          SMOKE_DIR="$(mktemp -d)"
          cp "./artifacts/newcx-v${VERSION}-${{ matrix.asset_suffix }}" "${SMOKE_DIR}/newcx"
          "${SMOKE_DIR}/newcx" link
          "${SMOKE_DIR}/newc" --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: newcx-${{ matrix.asset_suffix }}
          path: artifacts/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*
          generate_release_notes: true
